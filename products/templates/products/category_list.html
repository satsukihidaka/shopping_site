{% extends "products/base.html" %}

{% block title %}カテゴリ一覧 | shopping_site{% endblock %}

{% block content %}
<div class="mb-4">
    <h1 class="h3 mb-1">カテゴリ一覧</h1>
    <p class="text-muted mb-0">気になるカテゴリを選んで商品一覧へ進めます。</p>
</div>

<div class="row row-cols-1 row-cols-md-2 g-4">
    {% for category in categories %}
        <div class="col">
            <a href="{% url 'category_detail' slug=category.slug %}" class="text-decoration-none">
                <div class="card h-100 shadow-sm border-0">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h2 class="h5 text-dark mb-1">{{ category.name }}</h2>
                                <p class="text-muted mb-0">{{ category.product_count }}件の商品</p>
                            </div>
                            <span class="btn btn-outline-dark">見る</span>
                        </div>
                    </div>
                </div>
            </a>
        </div>
    {% empty %}
        <div class="col-12">
            <div class="alert alert-light border mb-0">カテゴリがまだ登録されていません。</div>
        </div>
    {% endfor %}
</div>
{% endblock %}
