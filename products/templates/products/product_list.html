<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>shopping_site | アパレルEC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">shopping_site</a>
        </div>
    </nav>

    <div class="container my-5">
        <h2 class="mb-4">新着アイテム一覧</h2>
        
        <div class="row row-cols-1 row-cols-md-4 g-4">
            {% for product in products %}
            <div class="col">
                <div class="card h-100 shadow-sm">
                    {% if product.image %}
                        <img src="{{ product.image.url }}" class="card-img-top" alt="{{ product.title }}" style="height: 250px; object-fit: cover;">
                    {% else %}
                        <div class="bg-secondary text-white d-flex align-items-center justify-content-center" style="height: 250px;">
                            NO IMAGE
                        </div>
                    {% endif %}
                    <div class="card-body">
                        <span class="badge bg-secondary mb-2">{{ product.category.name }}</span>
                        <h5 class="card-title text-dark">{{ product.title }}</h5>
                        <p class="card-text text-danger fw-bold">¥{{ product.price }} (税込)</p>
                    </div>
                </div>
            </div>
            {% empty %}
            <p>現在、登録されている商品はありません。</p>
            {% endfor %}
        </div>
    </div>

</body>
</html>
