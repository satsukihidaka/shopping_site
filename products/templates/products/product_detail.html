<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>{{ product.title }} | shopping_site</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'product_list' %}">shopping_site</a>
        </div>
    </nav>

    <div class="container my-5">
        <a href="{% url 'product_list' %}" class="btn btn-outline-secondary mb-4">← 商品一覧に戻る</a>

        <div class="row bg-white p-4 rounded shadow-sm">
            <div class="col-md-6 text-center">
                {% if product.image %}
                    <img src="{{ product.image.url }}" class="img-fluid rounded" alt="{{ product.title }}" style="max-height: 500px; object-fit: contain;">
                {% else %}
                    <div class="bg-secondary text-white d-flex align-items-center justify-content-center rounded" style="height: 400px;">
                        NO IMAGE
                    </div>
                {% endif %}
            </div>

            <div class="col-md-6">
                <span class="badge bg-secondary mb-2">{{ product.category.name }}</span>
                <h1 class="h2 text-dark mb-3">{{ product.title }}</h1>
                <hr>
                <h3 class="text-danger fw-bold mb-4">¥{{ product.price }} <span class="fs-6 text-muted">(税込)</span></h3>
                
                <h5 class="text-secondary">商品説明</h5>
                <p class="text-muted lh-lg mb-5">{{ product.description|linebreaksbr }}</p>

                <button class="btn btn-dark btn-lg w-100 py-3" disabled>カートに入れる（準備中）</button>
            </div>
        </div>
    </div>

</body>
</html>
