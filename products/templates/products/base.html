<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}shopping_site{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --site-mint: #a8ddd2;
            --site-mint-text: #1f4d45;
        }

        .navbar.site-navbar {
            background: var(--site-mint);
        }

        .navbar.site-navbar .navbar-brand,
        .navbar.site-navbar .nav-link,
        .navbar.site-navbar .navbar-toggler,
        .navbar.site-navbar .btn {
            color: var(--site-mint-text);
        }

        .navbar.site-navbar .navbar-toggler {
            border-color: rgba(31, 77, 69, 0.25);
        }

        .navbar.site-navbar .navbar-toggler:focus {
            box-shadow: 0 0 0 0.2rem rgba(127, 191, 178, 0.3);
        }

        .cart-link {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 999px;
            text-decoration: none;
            color: var(--site-mint-text);
        }

        .cart-count {
            position: absolute;
            top: -0.25rem;
            right: -0.25rem;
            min-width: 1.15rem;
            height: 1.15rem;
            padding: 0 0.3rem;
            border-radius: 999px;
            background: #ffffff;
            color: var(--site-mint-text);
            font-size: 0.72rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(31, 77, 69, 0.15);
        }

        .product-tile {
            position: relative;
            overflow: hidden;
            border-radius: 0.75rem;
            background: #fff;
        }

        .product-tile img {
            width: 100%;
            height: 320px;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease;
        }

        .product-tile:hover img {
            transform: scale(1.03);
        }

        .product-overlay {
            background: #fff;
            padding: 0.9rem 1rem 1rem;
            border-top: 1px solid rgba(0, 0, 0, 0.08);
        }

        .product-price {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transform: translateY(-6px);
            transition: max-height 0.25s ease, opacity 0.25s ease, transform 0.25s ease;
        }

        .product-tile:hover .product-price,
        .product-tile:focus-within .product-price {
            max-height: 3rem;
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar site-navbar sticky-top">
        <div class="container-fluid">
            <button
                class="navbar-toggler me-2"
                type="button"
                data-bs-toggle="offcanvas"
                data-bs-target="#categoryMenu"
                aria-controls="categoryMenu"
                aria-label="メニューを開く"
            >
                <span class="navbar-toggler-icon"></span>
            </button>
            <a class="navbar-brand fw-semibold" href="{% url 'product_list' %}">shopping_site</a>
            <div class="ms-auto d-flex align-items-center gap-2">
                <a class="cart-link" href="{% url 'cart_detail' %}" aria-label="カートを見る">
                    <i class="bi bi-cart3 fs-4"></i>
                    {% if cart_count %}
                        <span class="cart-count">{{ cart_count }}</span>
                    {% endif %}
                </a>
            </div>
        </div>
    </nav>

    <div class="offcanvas offcanvas-start" tabindex="-1" id="categoryMenu" aria-labelledby="categoryMenuLabel">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="categoryMenuLabel">カテゴリメニュー</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="閉じる"></button>
        </div>
        <div class="offcanvas-body">
            <div class="list-group">
                <a
                    href="{% url 'product_list' %}"
                    class="list-group-item list-group-item-action {% if not current_category %}active{% endif %}"
                >
                    すべての商品
                </a>
                {% for category_item in categories %}
                    <a
                        href="{% url 'category_detail' slug=category_item.slug %}"
                        class="list-group-item list-group-item-action {% if current_category and current_category.slug == category_item.slug %}active{% endif %}"
                    >
                        {{ category_item.name }}
                        <span class="badge text-bg-secondary rounded-pill float-end">
                            {{ category_item.product_count }}
                        </span>
                    </a>
                {% empty %}
                    <div class="list-group-item text-muted">カテゴリがまだありません</div>
                {% endfor %}
            </div>
        </div>
    </div>

    <main class="container my-5">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
